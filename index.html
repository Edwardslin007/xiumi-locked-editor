    function wireImageItem(item, id) {
      const srcInput = item.querySelector('[data-role="src"]');
      const altInput = item.querySelector('[data-role="alt"]');
      const fileInput = item.querySelector('[data-role="file"]');
      const hostFileInput = item.querySelector('[data-role="host-file"]');
      const locateButton = item.querySelector('[data-action="locate"]');
      const localButton = item.querySelector('[data-action="local"]');
      const hostLocalButton = item.querySelector('[data-action="host-local"]');
      const hostCurrentButton = item.querySelector('[data-action="host-current"]');
      const copyUrlButton = item.querySelector('[data-action="copy-url"]');
      const thumb = item.querySelector('.thumb');
      const formatNode = item.querySelector('[data-role="format"]');
      const altTextNode = item.querySelector('[data-role="altText"]');

      srcInput.addEventListener('input', () => {
        recordDebouncedHistory(`src-${id}`, state.imageInputTimers);
        const value = srcInput.value.trim();
        updateImageSource(id, value, item);
        setStatus(`图片 #${id} 已更新`);
      });

      altInput.addEventListener('input', () => {
        recordDebouncedHistory(`alt-${id}`, state.altInputTimers);
        const value = altInput.value;
        const img = getWorkingImageElement(id);
        const previewImg = getPreviewImageElement(id);
        if (img) img.setAttribute('alt', value);
        if (previewImg) previewImg.setAttribute('alt', value);
        altTextNode.textContent = value || '空';
      });

      locateButton.addEventListener('click', () => selectImage(id, true));
      localButton.addEventListener('click', () => fileInput.click());
      hostLocalButton.addEventListener('click', () => hostFileInput.click());
      hostCurrentButton.addEventListener('click', () => uploadCurrentImageToHost(id, item, hostCurrentButton));
      copyUrlButton.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(srcInput.value.trim());
          setStatus(`图片 #${id} 地址已复制`);
        } catch (error) {
          srcInput.focus();
          srcInput.select();
          setStatus('浏览器未允许复制，请手动复制地址');
        }
      });
      fileInput.addEventListener('change', () => replaceImageWithLocalFile(id, item));
      hostFileInput.addEventListener('change', () => uploadLocalFileToHost(id, item, hostFileInput, hostLocalButton));
    }

    function updateImageSource(id, value, item) {
      const img = getWorkingImageElement(id);
      const previewImg = getPreviewImageElement(id);
      const thumb = item.querySelector('.thumb');
      const formatNode = item.querySelector('[data-role="format"]');
      const kindNode = item.querySelector('.image-kind');
      const srcInput = item.querySelector('[data-role="src"]');
      if (img) img.setAttribute('src', value);
      if (previewImg) previewImg.setAttribute('src', value);
      if (thumb) thumb.src = value;
      if (formatNode) formatNode.textContent = getFormat(value);
      if (kindNode) kindNode.textContent = getImageKind(value);
      if (srcInput && srcInput.value !== value) srcInput.value = value;
      loadImageDimension(value, item);
    }

    function recordDebouncedHistory(key, timers) {
      if (!timers.has(key)) {
        recordHistory();
      }
      clearTimeout(timers.get(key));
      timers.set(key, setTimeout(() => {
        timers.delete(key);
      }, 900));
    }

    function replaceImageWithLocalFile(id, item) {
      const fileInput = item.querySelector('[data-role="file"]');
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        setStatus('请选择图片文件');
        fileInput.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        recordHistory();
        const dataUrl = String(reader.result || '');
        updateImageSource(id, dataUrl, item);
        const altInput = item.querySelector('[data-role="alt"]');
        if (altInput && !altInput.value.trim()) {
          altInput.value = file.name;
          altInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
        setStatus(`图片 #${id} 已替换为本地图片`);
      };
      reader.onerror = () => {
        setStatus('本地图片读取失败');
      };
      reader.readAsDataURL(file);
    }

    function loadImageHostConfig() {
      try {
        const saved = JSON.parse(localStorage.getItem(IMAGE_HOST_STORAGE_KEY) || '{}');
        state.imageHostConfig = {
          workerUrl: saved.workerUrl || '',
          token: saved.token || '',
          prefix: saved.prefix || 'xiumi'
        };
      } catch (error) {
        localStorage.removeItem(IMAGE_HOST_STORAGE_KEY);
      }
    }

    function saveImageHostConfig() {
      state.imageHostConfig = {
        workerUrl: document.getElementById('hostWorkerUrlInput').value.trim(),
        token: document.getElementById('hostTokenInput').value.trim(),
        prefix: document.getElementById('hostPrefixInput').value.trim() || 'xiumi'
      };
      localStorage.setItem(IMAGE_HOST_STORAGE_KEY, JSON.stringify(state.imageHostConfig));
      setHostStatus('图床设置已保存');
      setStatus('图床设置已保存');
    }

    function openImageHostModal() {
      loadImageHostConfig();
      document.getElementById('hostWorkerUrlInput').value = state.imageHostConfig.workerUrl || '';
      document.getElementById('hostTokenInput').value = state.imageHostConfig.token || '';
      document.getElementById('hostPrefixInput').value = state.imageHostConfig.prefix || 'xiumi';
      setHostStatus(state.imageHostConfig.workerUrl ? '已读取本地设置' : '未配置 Worker 地址');
      document.getElementById('imageHostBackdrop').classList.add('open');
      makeIcons();
    }

    function closeImageHostModal() {
      document.getElementById('imageHostBackdrop').classList.remove('open');
    }

    function setHostStatus(message) {
      document.getElementById('hostStatus').textContent = message;
    }

    function getImageHostConfig() {
      loadImageHostConfig();
      return state.imageHostConfig;
    }

    function ensureImageHostConfigured() {
      const config = getImageHostConfig();
      if (!config.workerUrl) {
        openImageHostModal();
        setStatus('请先填写 Worker 地址');
        return null;
      }
      return config;
    }

    function getWorkerBaseUrl(workerUrl) {
      return workerUrl.trim().replace(/\/+$/, '').replace(/\/upload$/, '');
    }

    function getWorkerUploadUrl(workerUrl) {
      const clean = workerUrl.trim().replace(/\/+$/, '');
      return clean.endsWith('/upload') ? clean : `${clean}/upload`;
    }

    function getWorkerTokenUrl(workerUrl) {
      return `${getWorkerBaseUrl(workerUrl)}/token`;
    }

    function getWorkerFetchUploadUrl(workerUrl) {
      return `${getWorkerBaseUrl(workerUrl)}/fetch-upload`;
    }

    function makeImageHostHeaders(config, json = false) {
      const headers = {};
      if (json) headers['Content-Type'] = 'application/json';
      if (config.token) headers.Authorization = `Bearer ${config.token}`;
      return headers;
    }

    async function testImageHostConnection() {
      saveImageHostConfig();
      const config = ensureImageHostConfigured();
      if (!config) return;
      setHostStatus('正在测试连接...');
      try {
        const response = await fetch(getWorkerBaseUrl(config.workerUrl), {
          method: 'GET',
          headers: makeImageHostHeaders(config)
        });
        const text = await response.text();
        if (!response.ok) throw new Error(text || `HTTP ${response.status}`);
        setHostStatus('连接正常');
        setStatus('七牛云图床连接正常');
      } catch (error) {
        setHostStatus(`连接失败：${error.message}`);
        setStatus('七牛云图床连接失败');
      }
    }

    function setUploadButtonState(button, uploading) {
      if (!button) return;
      button.disabled = uploading;
      button.classList.toggle('uploading', uploading);
    }

    async function uploadLocalFileToHost(id, item, fileInput, button) {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        setStatus('请选择图片文件');
        fileInput.value = '';
        return;
      }
      await uploadBlobToHostAndReplace(id, item, file, file.name, button);
      fileInput.value = '';
    }

    async function uploadCurrentImageToHost(id, item, button) {
      const src = item.querySelector('[data-role="src"]')?.value.trim() || '';
      if (!src) {
        setStatus('当前图片地址为空');
        return;
      }
      try {
        if (src.startsWith('data:image/')) {
          const blob = dataUrlToBlob(src);
          await uploadBlobToHostAndReplace(id, item, blob, inferFileName(src, `image-${id}`), button);
          return;
        }
        if (/^https?:\/\//i.test(src)) {
          await uploadRemoteImageToHostAndReplace(id, item, src, button);
          return;
        }
        setStatus('当前图片不是可上传的本地或网络图片');
      } catch (error) {
        setStatus(`图片 #${id} 上传失败：${error.message}`);
      }
    }

    async function uploadBlobToHostAndReplace(id, item, blob, filename, button) {
      const config = ensureImageHostConfigured();
      if (!config) return;
      setUploadButtonState(button, true);
      setStatus(`图片 #${id} 正在上传图床...`);
      try {
        const url = await uploadBlobToImageHost(blob, filename, config);
        recordHistory();
        updateImageSource(id, url, item);
        const altInput = item.querySelector('[data-role="alt"]');
        if (altInput && !altInput.value.trim() && filename) {
          altInput.value = filename;
          altInput.dispatchEvent(new Event('input', { bubbles: true }));
        }
        setStatus(`图片 #${id} 已上传图床`);
      } catch (error) {
        setStatus(`图片 #${id} 上传失败：${error.message}`);
        throw error;
      } finally {
        setUploadButtonState(button, false);
      }
    }

    async function uploadRemoteImageToHostAndReplace(id, item, sourceUrl, button) {
      const config = ensureImageHostConfigured();
      if (!config) return;
      setUploadButtonState(button, true);
      setStatus(`图片 #${id} 正在转存到图床...`);
      try {
        const url = await uploadRemoteImageToHost(sourceUrl, inferFileName(sourceUrl, `image-${id}`), config);
        recordHistory();
        updateImageSource(id, url, item);
        setStatus(`图片 #${id} 已转存到图床`);
      } catch (error) {
        setStatus(`图片 #${id} 转存失败：${error.message}`);
        throw error;
      } finally {
        setUploadButtonState(button, false);
      }
    }

    async function uploadBlobToImageHost(blob, filename, config) {
      const tokenData = await requestQiniuUploadToken(blob, filename, config);
      const form = new FormData();
      form.append('token', tokenData.token);
      form.append('key', tokenData.key);
      form.append('file', blob, filename || 'image.png');
      const response = await fetch(tokenData.uploadUrl, {
        method: 'POST',
        body: form
      });
      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch (error) {
        data = { error: text };
      }
      if (!response.ok) {
        throw new Error(data.error || data.message || text || `七牛 HTTP ${response.status}`);
      }
      return tokenData.url;
    }

    async function requestQiniuUploadToken(blob, filename, config) {
      const response = await fetch(getWorkerTokenUrl(config.workerUrl), {
        method: 'POST',
        headers: makeImageHostHeaders(config, true),
        body: JSON.stringify({
          name: filename || 'image.png',
          mimeType: blob.type || 'application/octet-stream',
          size: blob.size || 0,
          prefix: config.prefix || 'xiumi'
        })
      });
      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch (error) {
        data = { error: text };
      }
      if (!response.ok) {
        throw new Error(data.error || data.message || `HTTP ${response.status}`);
      }
      if (!data.token || !data.key || !data.uploadUrl || !data.url) {
        throw new Error('Worker 没有返回完整的七牛上传凭证');
      }
      return data;
    }

    async function uploadRemoteImageToHost(sourceUrl, filename, config) {
      const response = await fetch(getWorkerFetchUploadUrl(config.workerUrl), {
        method: 'POST',
        headers: makeImageHostHeaders(config, true),
        body: JSON.stringify({
          sourceUrl,
          name: filename || 'image',
          prefix: config.prefix || 'xiumi'
        })
      });
      return readImageHostUrl(response);
    }

    async function readImageHostUrl(response) {
      const text = await response.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch (error) {
        data = { error: text };
      }
      if (!response.ok) {
        throw new Error(data.error || data.message || `HTTP ${response.status}`);
      }
      const url = data.url || data.location || data.src;
      if (!url) throw new Error('上传接口没有返回图片 URL');
      return url;
    }

    function dataUrlToBlob(dataUrl) {
      const [head, body = ''] = dataUrl.split(',');
      const mime = (head.match(/data:([^;]+)/) || [])[1] || 'image/png';
      const binary = atob(body);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return new Blob([bytes], { type: mime });
    }

    function inferFileName(src, fallback) {
      if (src.startsWith('data:image/')) {
        const format = getFormat(src);
        return `${fallback}.${format === 'jpeg' ? 'jpg' : format || 'png'}`;
      }
      try {
        const path = new URL(src).pathname;
        const raw = decodeURIComponent(path.split('/').filter(Boolean).pop() || '');
        if (raw && /\.[a-z0-9]{2,5}$/i.test(raw)) return raw;
      } catch (error) {
        return `${fallback}.png`;
      }
      return `${fallback}.png`;
    }

    async function batchUploadImagesToHost() {
      if (!state.doc) {
        setStatus('没有可上传图片');
        return;
      }
      const config = ensureImageHostConfigured();
      if (!config) return;
      const images = Array.from(state.doc.querySelectorAll(`img[${helperAttrImage}]`));
      if (!images.length) {
        setStatus('没有检测到图片');
        return;
      }
      let success = 0;
      let failed = 0;
      for (const img of images) {
        const id = img.getAttribute(helperAttrImage);
        const item = dom.imageList.querySelector(`[data-image-id="${CSS.escape(String(id))}"]`);
        const src = img.getAttribute('src') || '';
        if (!item || !src) continue;
        const button = item.querySelector('[data-action="host-current"]');
        setStatus(`批量上传中：${success + failed + 1}/${images.length}`);
        try {
          if (src.startsWith('data:image/')) {
            const blob = dataUrlToBlob(src);
            await uploadBlobToHostAndReplace(id, item, blob, inferFileName(src, `image-${id}`), button);
            success += 1;
          } else if (/^https?:\/\//i.test(src)) {
            await uploadRemoteImageToHostAndReplace(id, item, src, button);
            success += 1;
          }
        } catch (error) {
          failed += 1;
        }
      }
      setStatus(`批量上传完成：成功 ${success} 张，失败 ${failed} 张`);
    }

    function selectImage(id, scroll = false) {
      state.activeImageId = String(id);
      document.querySelectorAll('.image-item.active').forEach((node) => node.classList.remove('active'));
      const item = dom.imageList.querySelector(`[data-image-id="${CSS.escape(String(id))}"]`);
      item?.classList.add('active');
      if (scroll) item?.scrollIntoView({ block: 'center', behavior: 'smooth' });

      const pdoc = dom.previewFrame.contentDocument;
      pdoc?.querySelectorAll('.xe-active-image').forEach((node) => node.classList.remove('xe-active-image'));
      const previewImg = getPreviewImageElement(id);
      if (previewImg) {
        previewImg.classList.add('xe-active-image');
        previewImg.scrollIntoView({ block: 'center', inline: 'nearest', behavior: 'smooth' });
      }
    }

    function getImageKind(src) {
      if (src.includes('templates-assets')) return '模板装饰';
      if (src.includes('/mat/i/')) return '正文素材';
      return '图片';
    }

    function getFormat(src) {
      if (src.startsWith('data:image/')) {
        const mime = src.slice('data:image/'.length).split(';')[0];
        return mime || 'base64';
      }
      const clean = src.split('?')[0].split('#')[0];
      const match = clean.match(/\.([a-zA-Z0-9]+)$/);
      return match ? match[1].toLowerCase() : '未知';
    }

    function loadImageDimension(src, item) {
      const dimensionNode = item.querySelector('[data-role="dimension"]');
      if (!src) {
        dimensionNode.textContent = '空';
        return;
      }
      const image = new Image();
      image.referrerPolicy = 'no-referrer';
      image.onload = () => {
        dimensionNode.textContent = `${image.naturalWidth} x ${image.naturalHeight}`;
      };
      image.onerror = () => {
        dimensionNode.textContent = parseCropDimension(src) || '读取失败';
      };
      image.src = src;
    }

    function parseCropDimension(src) {
      const cropMatch = src.match(/crop,h_(\d+),w_(\d+)/);
      if (cropMatch) return `${cropMatch[2]} x ${cropMatch[1]}`;
      const sizeMatch = src.match(/data-s="([^"]+)"/);
      return sizeMatch ? sizeMatch[1] : '';
    }

    async function loadSampleSource() {
      try {
        const response = await fetch(SOURCE_SAMPLE_PATH, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        parseAndLock(html);
        setStatus('示例已载入');
      } catch (error) {
        setStatus('示例读取失败');
      }
    }

    async function copySampleSource() {
      try {
        const response = await fetch(SOURCE_SAMPLE_PATH, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        await writeClipboardSource(html);
        setStatus('示例源码已复制');
      } catch (error) {
        setStatus('示例复制失败');
      }
    }

    function ensureTemplates() {
      const saved = localStorage.getItem(TEMPLATE_STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length) {
            state.templates = parsed;
            state.activeTemplateId = state.templates[0].id;
            return;
          }
        } catch (error) {
          localStorage.removeItem(TEMPLATE_STORAGE_KEY);
        }
      }
      state.templates = [
        { id: makeTemplateId(), name: '01模板', source: '' },
        { id: makeTemplateId(), name: '02模板', source: '' },
        { id: makeTemplateId(), name: '03模板', source: '' }
      ];
      state.activeTemplateId = state.templates[0].id;
      saveTemplatesToStorage();
    }

    function makeTemplateId() {
      return `tpl-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function saveTemplatesToStorage() {
      localStorage.setItem(TEMPLATE_STORAGE_KEY, JSON.stringify(state.templates));
    }

    function getActiveTemplate() {
      return state.templates.find((tpl) => tpl.id === state.activeTemplateId) || state.templates[0] || null;
    }

    function openTemplateModal() {
      ensureTemplates();
      renderTemplateList();
      renderTemplateEditor();
      document.getElementById('templateBackdrop').classList.add('open');
      makeIcons();
    }

    function closeTemplateModal() {
      document.getElementById('templateBackdrop').classList.remove('open');
    }

    function renderTemplateList() {
      const list = document.getElementById('templateList');
      list.innerHTML = '';
      state.templates.forEach((tpl, index) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'template-item';
        item.classList.toggle('active', tpl.id === state.activeTemplateId);
        item.innerHTML = `
          <span class="template-item-title">${escapeHtml(tpl.name || `模板 ${index + 1}`)}</span>
          <span class="template-item-meta">${tpl.source ? `${tpl.source.length} 字符` : '未填写源码'}</span>
        `;
        item.addEventListener('click', () => {
          state.activeTemplateId = tpl.id;
          renderTemplateList();
          renderTemplateEditor();
        });
        list.appendChild(item);
      });
    }

    function renderTemplateEditor() {
      const tpl = getActiveTemplate();
      document.getElementById('templateNameInput').value = tpl ? tpl.name : '';
      document.getElementById('templateSourceInput').value = tpl ? tpl.source : '';
      document.getElementById('deleteTemplateBtn').disabled = state.templates.length <= 1;
      document.getElementById('loadTemplateBtn').disabled = !tpl || !tpl.source.trim();
    }

    function saveActiveTemplate() {
      const tpl = getActiveTemplate();
      if (!tpl) return;
      recordHistory();
      tpl.name = document.getElementById('templateNameInput').value.trim() || '未命名模板';
      tpl.source = document.getElementById('templateSourceInput').value;
      saveTemplatesToStorage();
      renderTemplateList();
      renderTemplateEditor();
      setStatus('模板已保存');
    }

    function newTemplate() {
      recordHistory();
      const next = state.templates.length + 1;
      const tpl = {
        id: makeTemplateId(),
        name: `${String(next).padStart(2, '0')}模板`,
        source: ''
      };
      state.templates.push(tpl);
      state.activeTemplateId = tpl.id;
      saveTemplatesToStorage();
      renderTemplateList();
      renderTemplateEditor();
      setStatus('已新建模板');
    }

    function deleteActiveTemplate() {
      if (state.templates.length <= 1) return;
      const index = state.templates.findIndex((tpl) => tpl.id === state.activeTemplateId);
      if (index < 0) return;
      recordHistory();
      state.templates.splice(index, 1);
      state.activeTemplateId = state.templates[Math.max(0, index - 1)].id;
      saveTemplatesToStorage();
      renderTemplateList();
      renderTemplateEditor();
      setStatus('模板已删除');
    }

    function loadActiveTemplate() {
      saveActiveTemplate();
      const tpl = getActiveTemplate();
      if (!tpl || !tpl.source.trim()) {
        setStatus('当前模板没有源码');
        return;
      }
      parseAndLock(tpl.source);
      closeTemplateModal();
      setStatus(`已载入：${tpl.name}`);
    }

    async function copyFinalSource() {
      if (!state.doc) {
        setStatus('没有可复制源码');
        return;
      }
      const html = getCleanHtml();
      try {
        await writeClipboardHtml(html);
        setStatus('完整源码已复制');
      } catch (error) {
        setStatus('复制失败，浏览器不允许写入剪贴板');
      }
    }

    async function writeClipboardHtml(html) {
      const plain = getBodyText(html);
      if (navigator.clipboard && window.ClipboardItem) {
        const item = new ClipboardItem({
          'text/html': new Blob([html], { type: 'text/html' }),
          'text/plain': new Blob([plain || html], { type: 'text/plain' })
        });
        await navigator.clipboard.write([item]);
        return;
      }
      await navigator.clipboard.writeText(html);
    }

    async function writeClipboardSource(html) {
      if (navigator.clipboard && window.ClipboardItem) {
        const item = new ClipboardItem({
          'text/html': new Blob([html], { type: 'text/html' }),
          'text/plain': new Blob([html], { type: 'text/plain' })
        });
        await navigator.clipboard.write([item]);
        return;
      }
      await navigator.clipboard.writeText(html);
    }

    async function saveSourceFile() {
      if (!state.doc) {
        setStatus('没有可保存源码');
        return;
      }
      const html = getCleanHtml();
      const filename = makeSourceFilename();
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });

      if (state.projectDirHandle) {
        const saved = await saveBlobToProjectFolder(blob, filename);
        if (saved) return;
      }

      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: filename,
            types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
          });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
          setStatus('源码文件已保存');
          return;
        } catch (error) {
          if (error.name === 'AbortError') {
            setStatus('已取消保存');
            return;
          }
        }
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setStatus('源码文件已下载');
    }

    function makeSourceFilename() {
      loadProjectFolderConfig();
      const prefix = (state.projectFolderConfig.filePrefix || 'xiumi-edited')
        .trim()
        .replace(/[\\/:*?"<>|]+/g, '-')
        .replace(/\s+/g, '-')
        .replace(/^-+|-+$/g, '') || 'xiumi-edited';
      return `${prefix}-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.html`;
    }

    async function saveBlobToProjectFolder(blob, filename) {
      try {
        const permitted = await verifyProjectFolderPermission(state.projectDirHandle, true);
        if (!permitted) {
          setStatus('项目文件夹没有写入权限，请重新选择');
          return false;
        }
        const fileHandle = await state.projectDirHandle.getFileHandle(filename, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        setStatus(`源码已保存到项目文件夹：${filename}`);
        return true;
      } catch (error) {
        setStatus(`项目文件夹保存失败：${error.message}`);
        return false;
      }
    }

    function loadProjectFolderConfig() {
      try {
        const saved = JSON.parse(localStorage.getItem(PROJECT_FOLDER_STORAGE_KEY) || '{}');
        state.projectFolderConfig = {
          pathLabel: saved.pathLabel || '',
          filePrefix: saved.filePrefix || 'xiumi-edited'
        };
      } catch (error) {
        localStorage.removeItem(PROJECT_FOLDER_STORAGE_KEY);
      }
    }

    function saveProjectFolderConfig() {
      state.projectFolderConfig = {
        pathLabel: document.getElementById('projectFolderPathInput').value.trim(),
        filePrefix: document.getElementById('projectFilePrefixInput').value.trim() || 'xiumi-edited'
      };
      localStorage.setItem(PROJECT_FOLDER_STORAGE_KEY, JSON.stringify(state.projectFolderConfig));
      updateProjectPathChip();
      setProjectFolderStatus('项目路径已确认');
      setStatus('项目文件夹路径已确认');
      closeProjectFolderModal();
    }

    function updateProjectPathChip() {
      loadProjectFolderConfig();
      const label = state.projectFolderConfig.pathLabel || (state.projectDirHandle ? state.projectDirHandle.name : '');
      dom.projectPathText.textContent = label || '未选择项目文件夹';
      dom.projectPathChip.classList.toggle('empty', !label);
      dom.projectPathChip.title = label ? `点击复制：${label}` : '点击打开项目文件夹设置';
    }

    function openProjectFolderModal() {
      loadProjectFolderConfig();
      document.getElementById('projectFolderPathInput').value = state.projectFolderConfig.pathLabel || '';
      document.getElementById('projectFilePrefixInput').value = state.projectFolderConfig.filePrefix || 'xiumi-edited';
      document.getElementById('projectHandleStateInput').value = state.projectDirHandle ? `已授权：${state.projectDirHandle.name}` : '未选择';
      setProjectFolderStatus(state.projectDirHandle ? '已选择文件夹，可保存源码' : '请先选择文件夹');
      document.getElementById('projectFolderBackdrop').classList.add('open');
      makeIcons();
    }

    function closeProjectFolderModal() {
      document.getElementById('projectFolderBackdrop').classList.remove('open');
    }

    function setProjectFolderStatus(message) {
      document.getElementById('projectFolderStatus').textContent = message;
    }

    async function chooseProjectFolder() {
      if (!window.showDirectoryPicker) {
        setProjectFolderStatus('当前浏览器不支持选择文件夹，请使用 Chrome 或 Edge');
        return;
      }
      try {
        const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
        const permitted = await verifyProjectFolderPermission(handle, true);
        if (!permitted) {
          setProjectFolderStatus('未获得文件夹写入权限');
          return;
        }
        state.projectDirHandle = handle;
        await persistProjectDirectoryHandle(handle);
        document.getElementById('projectHandleStateInput').value = `已授权：${handle.name}`;
        const pathInput = document.getElementById('projectFolderPathInput');
        if (!pathInput.value.trim()) pathInput.value = handle.name;
        setProjectFolderStatus('文件夹已选择，请确认路径');
      } catch (error) {
        if (error.name === 'AbortError') {
          setProjectFolderStatus('已取消选择');
          return;
        }
        setProjectFolderStatus(`选择失败：${error.message}`);
      }
    }

    async function verifyProjectFolderPermission(handle, write = false) {
      if (!handle) return false;
      const options = write ? { mode: 'readwrite' } : {};
      if (typeof handle.queryPermission === 'function') {
        const current = await handle.queryPermission(options);
        if (current === 'granted') return true;
      }
      if (typeof handle.requestPermission === 'function') {
        const next = await handle.requestPermission(options);
        return next === 'granted';
      }
      return true;
    }

    async function copyProjectPath() {
      loadProjectFolderConfig();
      const label = state.projectFolderConfig.pathLabel || (state.projectDirHandle ? state.projectDirHandle.name : '');
      if (!label) {
        openProjectFolderModal();
        return;
      }
      try {
        await navigator.clipboard.writeText(label);
        setStatus('项目路径已复制');
      } catch (error) {
        setStatus('浏览器未允许复制项目路径');
      }
    }

    async function openProjectDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(PROJECT_HANDLE_DB, 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore(PROJECT_HANDLE_STORE);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function persistProjectDirectoryHandle(handle) {
      if (!window.indexedDB || !handle) return;
      const db = await openProjectDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(PROJECT_HANDLE_STORE, 'readwrite');
        tx.objectStore(PROJECT_HANDLE_STORE).put(handle, 'projectDir');
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
      db.close();
    }

    async function restoreProjectDirectoryHandle() {
      loadProjectFolderConfig();
      updateProjectPathChip();
      if (!window.indexedDB) return;
      try {
        const db = await openProjectDb();
        const handle = await new Promise((resolve, reject) => {
          const tx = db.transaction(PROJECT_HANDLE_STORE, 'readonly');
          const request = tx.objectStore(PROJECT_HANDLE_STORE).get('projectDir');
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
        db.close();
        if (handle) {
          state.projectDirHandle = handle;
          updateProjectPathChip();
        }
      } catch (error) {
        setStatus('项目文件夹授权恢复失败，可重新选择');
      }
    }

    function unlockSource() {
      state.sourceLocked = false;
      dom.sourceBox.readOnly = false;
      dom.sourceBox.focus();
      updateSourceState();
      setStatus('可以重新粘贴');
    }

    function clearWorkspace(options = {}) {
      if (options.recordHistory !== false) {
        recordHistory();
      }
      state.doc = null;
      state.sourceLocked = false;
      dom.sourceBox.readOnly = false;
      dom.sourceBox.value = '';
      dom.imageList.innerHTML = '';
      dom.imageState.textContent = '0 张图片';
      updateSourceState();
      renderPreview();
      setStatus('已清空');
      updateHistoryButtons();
    }

    function refreshFromSource() {
      if (!dom.sourceBox.value.trim()) return;
      parseAndLock(dom.sourceBox.value);
    }

    function setPanelCollapsed(panel, collapsed) {
      const className = panel === 'source' ? 'source-collapsed' : 'image-collapsed';
      dom.appRoot.classList.toggle(className, collapsed);
      requestAnimationFrame(() => {
        syncFrameHeight();
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('\n', '&#10;');
    }

    function scheduleParse() {
      clearTimeout(state.debounceTimer);
      state.debounceTimer = setTimeout(() => {
        if (!state.sourceLocked && dom.sourceBox.value.trim()) {
          parseAndLock(dom.sourceBox.value);
        }
      }, 450);
    }

    dom.sourceBox.addEventListener('paste', (event) => {
      const html = event.clipboardData?.getData('text/html') || '';
      const text = event.clipboardData?.getData('text/plain') || '';
      const source = html && /<[^>]+>/.test(html) ? html : text;
      if (!source) return;
      event.preventDefault();
      dom.sourceBox.value = normalizeInputHtml(source);
      parseAndLock(dom.sourceBox.value);
    });

    dom.sourceBox.addEventListener('input', scheduleParse);
    dom.previewFrame.addEventListener('load', attachPreviewHandlers);

    document.getElementById('sampleLoadBtn').addEventListener('click', loadSampleSource);
    document.getElementById('templateBtn').addEventListener('click', openTemplateModal);
    document.getElementById('imageHostBtn').addEventListener('click', openImageHostModal);
    document.getElementById('sampleCopyBtn').addEventListener('click', copySampleSource);
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);
    document.getElementById('copyBtn').addEventListener('click', copyFinalSource);
    document.getElementById('saveBtn').addEventListener('click', saveSourceFile);
    document.getElementById('projectFolderBtn').addEventListener('click', openProjectFolderModal);
    document.getElementById('projectPathChip').addEventListener('click', copyProjectPath);
    document.getElementById('unlockBtn').addEventListener('click', unlockSource);
    document.getElementById('clearBtn').addEventListener('click', clearWorkspace);
    document.getElementById('refreshBtn').addEventListener('click', refreshFromSource);
    document.getElementById('locateFirstImageBtn').addEventListener('click', () => selectImage('1', true));
    document.getElementById('collapseSourceBtn').addEventListener('click', () => setPanelCollapsed('source', true));
    document.getElementById('expandSourceBtn').addEventListener('click', () => setPanelCollapsed('source', false));
    document.getElementById('collapseImageBtn').addEventListener('click', () => setPanelCollapsed('image', true));
    document.getElementById('expandImageBtn').addEventListener('click', () => setPanelCollapsed('image', false));
    document.getElementById('batchUploadBtn').addEventListener('click', batchUploadImagesToHost);
    document.getElementById('imageHostFooterBtn').addEventListener('click', openImageHostModal);
    document.getElementById('closeEditorBtn').addEventListener('click', () => closeTextEditor(true));
    document.getElementById('cancelEditBtn').addEventListener('click', () => closeTextEditor(true));
    document.getElementById('saveEditBtn').addEventListener('click', saveTextEdit);
    document.getElementById('closeTemplateBtn').addEventListener('click', closeTemplateModal);
    document.getElementById('newTemplateBtn').addEventListener('click', newTemplate);
    document.getElementById('deleteTemplateBtn').addEventListener('click', deleteActiveTemplate);
    document.getElementById('saveTemplateBtn').addEventListener('click', saveActiveTemplate);
    document.getElementById('loadTemplateBtn').addEventListener('click', loadActiveTemplate);
    document.getElementById('closeImageHostBtn').addEventListener('click', closeImageHostModal);
    document.getElementById('saveImageHostBtn').addEventListener('click', saveImageHostConfig);
    document.getElementById('testImageHostBtn').addEventListener('click', testImageHostConnection);
    document.getElementById('closeProjectFolderBtn').addEventListener('click', closeProjectFolderModal);
    document.getElementById('chooseProjectFolderBtn').addEventListener('click', chooseProjectFolder);
    document.getElementById('saveProjectFolderBtn').addEventListener('click', saveProjectFolderConfig);

    dom.editorSurface.addEventListener('input', updateLivePreview);
    dom.editorBackdrop.addEventListener('mousedown', (event) => {
      if (event.target === dom.editorBackdrop) closeTextEditor(true);
    });
    document.getElementById('templateBackdrop').addEventListener('mousedown', (event) => {
      if (event.target === document.getElementById('templateBackdrop')) closeTemplateModal();
    });
    document.getElementById('imageHostBackdrop').addEventListener('mousedown', (event) => {
      if (event.target === document.getElementById('imageHostBackdrop')) closeImageHostModal();
    });
    document.getElementById('projectFolderBackdrop').addEventListener('mousedown', (event) => {
      if (event.target === document.getElementById('projectFolderBackdrop')) closeProjectFolderModal();
    });

    document.getElementById('toolbar').addEventListener('mousedown', (event) => {
      const button = event.target.closest('button');
      if (button) event.preventDefault();
    });

    document.getElementById('toolbar').addEventListener('click', (event) => {
      const commandButton = event.target.closest('[data-cmd]');
      const alignButton = event.target.closest('[data-align]');
      if (commandButton) {
        execInlineCommand(commandButton.dataset.cmd);
      }
      if (alignButton) {
        applyAlignment(alignButton.dataset.align);
      }
    });

    dom.colorInput.addEventListener('input', () => {
      wrapSelectionWithStyle(`color: ${dom.colorInput.value};`);
    });

    dom.fontSizeSelect.addEventListener('change', () => {
      wrapSelectionWithStyle(`font-size: ${dom.fontSizeSelect.value}px;`);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && dom.editorBackdrop.classList.contains('open')) {
        closeTextEditor(true);
      }
      if (event.key === 'Escape' && document.getElementById('templateBackdrop').classList.contains('open')) {
        closeTemplateModal();
      }
      if (event.key === 'Escape' && document.getElementById('imageHostBackdrop').classList.contains('open')) {
        closeImageHostModal();
      }
      if (event.key === 'Escape' && document.getElementById('projectFolderBackdrop').classList.contains('open')) {
        closeProjectFolderModal();
      }
      if ((event.ctrlKey || event.metaKey) && !event.shiftKey && event.key.toLowerCase() === 'z' && !dom.editorBackdrop.classList.contains('open')) {
        event.preventDefault();
        undo();
      }
      if (((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'y') || ((event.ctrlKey || event.metaKey) && event.shiftKey && event.key.toLowerCase() === 'z')) {
        event.preventDefault();
        redo();
      }
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
        event.preventDefault();
        if (dom.editorBackdrop.classList.contains('open')) {
          saveTextEdit();
        } else if (document.getElementById('templateBackdrop').classList.contains('open')) {
          saveActiveTemplate();
        } else {
          saveSourceFile();
        }
      }
    });

    window.__xiumiTool = {
      loadSampleSource,
      openTemplateModal,
      openTextEditor,
      saveTextEdit,
      undo,
      redo,
      openImageHostModal,
      batchUploadImagesToHost,
      openProjectFolderModal,
      copyFinalSource,
      getCleanHtml: () => getCleanHtml(),
      stats: () => ({
        text: state.doc?.querySelectorAll(`[${helperAttrText}]`).length || 0,
        image: state.doc?.querySelectorAll(`img[${helperAttrImage}]`).length || 0,
        section: state.doc?.querySelectorAll('section').length || 0,
        style: state.doc?.querySelectorAll('[style]').length || 0
      })
    };

    loadImageHostConfig();
    restoreProjectDirectoryHandle();
    ensureTemplates();
    updateHistoryButtons();
    makeIcons();
  </script>
</body>
</html>
