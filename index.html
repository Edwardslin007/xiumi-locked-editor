<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>秀米样式锁定编辑器</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #fafafa;
      --line: #d8dde6;
      --line-strong: #b8c0cc;
      --text: #20242b;
      --muted: #69727f;
      --accent: #e73a30;
      --accent-soft: #fff0ee;
      --green: #10a66f;
      --focus: #2563eb;
      --shadow: 0 12px 34px rgba(28, 35, 45, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      height: 34px;
      border-radius: 6px;
      padding: 0 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--line-strong);
      background: var(--panel-soft);
    }

    button.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    button.primary:hover {
      filter: brightness(0.96);
    }

    button.danger {
      border-color: #f2b9b5;
      color: #a82018;
      background: #fff7f6;
    }

    button.icon {
      width: 34px;
      padding: 0;
    }

    button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #a82018;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    svg {
      width: 17px;
      height: 17px;
      stroke-width: 2;
      flex: 0 0 auto;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 190px;
      font-weight: 700;
      font-size: 17px;
    }

    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background:
        linear-gradient(135deg, #e73a30 0 48%, transparent 48%),
        linear-gradient(45deg, #10a66f 0 48%, #f0c24b 48% 100%);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .draft-link {
      margin-left: auto;
      color: var(--focus);
      text-decoration: none;
      border: 1px solid #bfd0ff;
      background: #f5f8ff;
      height: 34px;
      border-radius: 6px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .project-path-chip {
      max-width: 240px;
      min-width: 112px;
      border: 1px solid #d7eadf;
      background: #f4fbf7;
      color: #245f3d;
      height: 34px;
      border-radius: 6px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-path-chip.empty {
      border-color: var(--line);
      background: #fff;
      color: var(--muted);
    }

    .project-path-chip span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status {
      min-width: 180px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main {
      --source-col: minmax(300px, 30vw);
      --image-col: minmax(360px, 27vw);
      min-height: 0;
      display: grid;
      grid-template-columns: var(--source-col) minmax(430px, 1fr) var(--image-col);
      transition: grid-template-columns 0.18s ease;
    }

    .app.source-collapsed .main {
      --source-col: 46px;
    }

    .app.image-collapsed .main {
      --image-col: 46px;
    }

    .source-panel,
    .preview-panel,
    .image-panel {
      min-height: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      flex-direction: column;
    }

    .image-panel {
      border-right: 0;
    }

    .source-panel,
    .image-panel {
      position: relative;
      min-width: 0;
    }

    .collapse-rail {
      display: none;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0;
      background: #fff;
      color: var(--muted);
      padding: 0;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .app.source-collapsed .source-panel > :not(.collapse-rail),
    .app.image-collapsed .image-panel > :not(.collapse-rail) {
      display: none;
    }

    .app.source-collapsed .source-panel,
    .app.image-collapsed .image-panel {
      border-right: 1px solid var(--line);
      overflow: hidden;
    }

    .app.source-collapsed .source-panel .collapse-rail,
    .app.image-collapsed .image-panel .collapse-rail {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-head {
      height: 45px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .panel-tools {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .source-box {
      min-height: 0;
      flex: 1;
      width: 100%;
      resize: none;
      border: 0;
      padding: 14px;
      color: #242a31;
      background: #fbfcfe;
      outline: none;
      line-height: 1.5;
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 12px;
    }

    .source-box[readonly] {
      color: #5e6672;
      background:
        repeating-linear-gradient(
          -45deg,
          #fbfcfe 0,
          #fbfcfe 12px,
          #f5f7fb 12px,
          #f5f7fb 24px
        );
    }

    .source-footer,
    .image-footer {
      height: 34px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      flex: 0 0 auto;
    }

    .preview-shell {
      min-height: 0;
      flex: 1;
      display: flex;
      justify-content: center;
      overflow: auto;
      padding: 26px 18px 40px;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px),
        linear-gradient(0deg, rgba(0, 0, 0, 0.025) 1px, transparent 1px);
      background-size: 18px 18px;
    }

    .phone-canvas {
      width: min(100%, 430px);
      height: max-content;
      min-height: 680px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .preview-frame {
      display: block;
      width: 100%;
      height: 720px;
      min-height: 720px;
      border: 0;
      background: #fff;
    }

    .empty-preview {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      line-height: 1.7;
    }

    .image-list {
      min-height: 0;
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
      background: #fbfcfe;
    }

    .image-item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      overflow: visible;
    }

    .image-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(231, 58, 48, 0.22), 0 10px 24px rgba(231, 58, 48, 0.16);
    }

    .image-item-head {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 9px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .image-index {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 700;
    }

    .image-kind {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .image-body {
      padding: 9px;
      display: grid;
      gap: 9px;
    }

    .thumb-row {
      display: grid;
      grid-template-columns: 118px 1fr;
      gap: 9px;
      align-items: start;
    }

    .thumb {
      width: 118px;
      height: 86px;
      object-fit: contain;
      background: #f1f3f6;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 4px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
    }

    .field input,
    .field textarea,
    .field select {
      border: 1px solid var(--line);
      border-radius: 6px;
      outline: none;
      background: #fff;
      min-width: 0;
    }

    .field input,
    .field select {
      height: 32px;
      padding: 0 8px;
    }

    .field textarea {
      min-height: 58px;
      padding: 7px 8px;
      resize: vertical;
      line-height: 1.45;
      word-break: break-all;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus,
    .editor-surface:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .image-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
    }

    .image-actions button.uploading {
      border-color: #f0c24b;
      background: #fff9e6;
      color: #8a5c00;
    }

    .image-footer {
      justify-content: space-between;
    }

    .image-footer-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .file-input {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 25, 33, 0.28);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 24px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .editor-modal {
      width: min(920px, 94vw);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(16, 24, 40, 0.28);
      border: 1px solid var(--line);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto minmax(220px, 44vh) auto;
    }

    .template-modal {
      width: min(1120px, 94vw);
      height: min(760px, 88vh);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(16, 24, 40, 0.28);
      border: 1px solid var(--line);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .host-modal {
      width: min(720px, 94vw);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(16, 24, 40, 0.28);
      border: 1px solid var(--line);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .host-body {
      padding: 16px;
      display: grid;
      gap: 12px;
      background: #fbfcfe;
    }

    .host-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .host-note {
      border: 1px solid #d7eadf;
      background: #f4fbf7;
      color: #315f45;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
    }

    .host-actions {
      min-height: 52px;
      padding: 9px 16px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fff;
    }

    .host-status {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .template-body {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .template-list {
      min-height: 0;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: #fbfcfe;
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .template-item {
      height: auto;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      display: grid;
      gap: 4px;
      text-align: left;
      justify-content: stretch;
      align-items: stretch;
    }

    .template-item:hover {
      border-color: var(--line-strong);
    }

    .template-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(231, 58, 48, 0.13);
    }

    .template-item-title {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .template-item-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .template-editor {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .template-source {
      width: 100%;
      height: 100%;
      min-height: 360px;
      resize: none;
      font-family: Consolas, "SFMono-Regular", Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .template-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .editor-head {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .editor-title {
      font-weight: 700;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar {
      min-height: 48px;
      padding: 7px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .toolbar input[type="color"] {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 3px;
      cursor: pointer;
    }

    .toolbar select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 0 8px;
    }

    .editor-surface {
      margin: 14px;
      padding: 18px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      line-height: 1.8;
      background: #fff;
      color: #222;
      font-size: 17px;
    }

    .editor-actions {
      min-height: 50px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .text-chip {
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 9px;
      color: var(--muted);
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1180px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .source-panel,
      .preview-panel,
      .image-panel {
        min-height: 460px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .topbar {
        height: auto;
        min-height: 56px;
        flex-wrap: wrap;
        padding-block: 10px;
      }

      .draft-link {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div id="appRoot" class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>秀米样式锁定编辑器</span>
      </div>
      <div class="top-actions">
        <button id="sampleLoadBtn" type="button"><i data-lucide="file-input"></i>载入示例</button>
        <button id="templateBtn" type="button"><i data-lucide="layers"></i>源码模板</button>
        <button id="imageHostBtn" type="button"><i data-lucide="cloud-upload"></i>图床设置</button>
        <button id="sampleCopyBtn" type="button"><i data-lucide="copy"></i>复制示例源码</button>
        <button id="undoBtn" class="icon" type="button" title="撤销"><i data-lucide="undo-2"></i></button>
        <button id="redoBtn" class="icon" type="button" title="重做"><i data-lucide="redo-2"></i></button>
        <button id="copyBtn" class="primary" type="button"><i data-lucide="clipboard-copy"></i>一键复制源码</button>
        <button id="saveBtn" type="button"><i data-lucide="download"></i>保存源码文件</button>
        <button id="projectFolderBtn" type="button"><i data-lucide="folder-check"></i>项目文件夹</button>
        <button id="projectPathChip" class="project-path-chip empty" type="button" title="点击复制项目路径">
          <i data-lucide="copy"></i><span id="projectPathText">未选择项目文件夹</span>
        </button>
        <a class="draft-link" href="https://mp.weixin.qq.com/cgi-bin/appmsg?begin=0&count=10&type=77&action=list_card&token=1255399380&lang=zh_CN" target="_blank" rel="noreferrer">
          <i data-lucide="external-link"></i>公众号草稿箱
        </a>
      </div>
      <div id="status" class="status">等待粘贴源码</div>
    </header>

    <main class="main">
      <section class="source-panel">
        <button id="expandSourceBtn" class="collapse-rail" type="button" title="展开源码栏">展开源码</button>
        <div class="panel-head">
          <div class="panel-title">源码粘贴框</div>
          <div class="panel-tools">
            <button id="collapseSourceBtn" class="icon" type="button" title="收纳源码栏"><i data-lucide="panel-left-close"></i></button>
            <button id="unlockBtn" type="button"><i data-lucide="unlock"></i>重新粘贴</button>
            <button id="clearBtn" class="danger" type="button"><i data-lucide="trash-2"></i>清空</button>
          </div>
        </div>
        <textarea id="sourceBox" class="source-box" spellcheck="false" placeholder="把秀米编辑器复制出来的 HTML 或富文本粘贴到这里"></textarea>
        <div class="source-footer">
          <span id="sourceState">未锁定</span>
          <span id="structureState"></span>
        </div>
      </section>

      <section class="preview-panel">
        <div class="panel-head">
          <div class="panel-title">公众号排版预览</div>
          <div class="panel-tools">
            <button id="refreshBtn" type="button"><i data-lucide="refresh-cw"></i>刷新</button>
          </div>
        </div>
        <div class="preview-shell">
          <div class="phone-canvas">
            <div id="emptyPreview" class="empty-preview">粘贴后显示完整排版</div>
            <iframe id="previewFrame" class="preview-frame hidden" title="公众号排版预览"></iframe>
          </div>
        </div>
      </section>

      <section class="image-panel">
        <button id="expandImageBtn" class="collapse-rail" type="button" title="展开图片栏">展开图片</button>
        <div class="panel-head">
          <div class="panel-title">图片编辑框</div>
          <div class="panel-tools">
            <button id="collapseImageBtn" class="icon" type="button" title="收纳图片栏"><i data-lucide="panel-right-close"></i></button>
            <button id="locateFirstImageBtn" type="button"><i data-lucide="image"></i>定位首图</button>
          </div>
        </div>
        <div id="imageList" class="image-list"></div>
        <div class="image-footer">
          <span id="imageState">0 张图片</span>
          <div class="image-footer-actions">
            <button id="batchUploadBtn" type="button"><i data-lucide="cloud-upload"></i>批量上传图床</button>
            <button id="imageHostFooterBtn" type="button"><i data-lucide="settings"></i>设置</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="editorBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="editor-modal">
      <div class="editor-head">

  <script>
    const SOURCE_SAMPLE_PATH = 'examples/sample-xiumi.html';
    const DRAFT_URL = 'https://mp.weixin.qq.com/cgi-bin/appmsg?begin=0&count=10&type=77&action=list_card&token=1255399380&lang=zh_CN';
    const TEMPLATE_STORAGE_KEY = 'xiumi_locked_editor_templates_v1';
    const IMAGE_HOST_STORAGE_KEY = 'xiumi_image_host_config_v1';
    const PROJECT_FOLDER_STORAGE_KEY = 'xiumi_project_folder_config_v1';
    const PROJECT_HANDLE_DB = 'xiumi-project-folder-db';
    const PROJECT_HANDLE_STORE = 'handles';
    const helperAttrText = 'data-xe-text-id';
    const helperAttrImage = 'data-xe-img-id';
    const helperOriginal = 'data-xe-original-text';

    const dom = {
      appRoot: document.getElementById('appRoot'),
      sourceBox: document.getElementById('sourceBox'),
      sourceState: document.getElementById('sourceState'),
      structureState: document.getElementById('structureState'),
      status: document.getElementById('status'),
      previewFrame: document.getElementById('previewFrame'),
      emptyPreview: document.getElementById('emptyPreview'),
      imageList: document.getElementById('imageList'),
      imageState: document.getElementById('imageState'),
      editorBackdrop: document.getElementById('editorBackdrop'),
      editorTitle: document.getElementById('editorTitle'),
      editorSurface: document.getElementById('editorSurface'),
      editorMeta: document.getElementById('editorMeta'),
      colorInput: document.getElementById('colorInput'),
      fontSizeSelect: document.getElementById('fontSizeSelect'),
      projectPathChip: document.getElementById('projectPathChip'),
      projectPathText: document.getElementById('projectPathText')
    };

    const state = {
      doc: null,
      sourceLocked: false,
      activeTextId: null,
      activeImageId: null,
      editingOriginalText: '',
      editingOriginalHtml: '',
      editAlignment: '',
      debounceTimer: null,
      templates: [],
      activeTemplateId: '',
      undoStack: [],
      redoStack: [],
      historyLimit: 60,
      suppressHistory: false,
      imageInputTimers: new Map(),
      altInputTimers: new Map(),
      imageHostConfig: {
        workerUrl: '',
        token: '',
        prefix: 'xiumi'
      },
      projectFolderConfig: {
        pathLabel: '',
        filePrefix: 'xiumi-edited'
      },
      projectDirHandle: null
    };

    function setStatus(message) {
      dom.status.textContent = message;
    }

    function makeIcons() {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }

    function normalizeInputHtml(raw) {
      const html = (raw || '').trim();
      if (!html) return '';
      const start = html.indexOf('<!--StartFragment-->');
      const end = html.indexOf('<!--EndFragment-->');
      if (start >= 0 && end > start) {
        return html.slice(start + '<!--StartFragment-->'.length, end).trim();
      }
      return html;
    }

    function parseAndLock(rawHtml, options = {}) {
      if (options.recordHistory !== false) {
        recordHistory();
      }
      const normalized = normalizeInputHtml(rawHtml);
      if (!normalized) {
        clearWorkspace({ recordHistory: false });
        return;
      }

      const parser = new DOMParser();
      const parsed = parser.parseFromString(normalized, 'text/html');
      const parserError = parsed.querySelector('parsererror');
      if (parserError) {
        setStatus('源码解析失败');
        return;
      }

      setWorkingDocument(parsed);
      setStatus('源码已锁定');
    }

    function setWorkingDocument(doc) {
      state.doc = doc;
      markEditableNodes(state.doc);
      state.sourceLocked = true;
      dom.sourceBox.value = getMarkedHtml();
      dom.sourceBox.readOnly = true;
      updateSourceState();
      renderPreview();
      renderImagePanel();
      updateHistoryButtons();
    }

    function clearEditorMarks(root) {
      root.querySelectorAll(`[${helperAttrText}], [${helperAttrImage}], [${helperOriginal}]`).forEach((node) => {
        node.removeAttribute(helperAttrText);
        node.removeAttribute(helperAttrImage);
        node.removeAttribute(helperOriginal);
      });
    }

    function markEditableNodes(doc) {
      clearEditorMarks(doc);
      const skipTags = new Set(['HTML', 'HEAD', 'BODY', 'SCRIPT', 'STYLE', 'SVG', 'PATH', 'BR', 'META', 'LINK']);
      let textId = 0;
      let imageId = 0;
      const elements = Array.from(doc.body.querySelectorAll('*'));

      for (const el of elements) {
        if (skipTags.has(el.tagName)) continue;
        const directText = Array.from(el.childNodes)
          .filter((node) => node.nodeType === Node.TEXT_NODE)
          .map((node) => node.nodeValue)
          .join('')
          .replace(/\s+/g, ' ')
          .trim();
        if (directText) {
          textId += 1;
          el.setAttribute(helperAttrText, String(textId));
          el.setAttribute(helperOriginal, directText);
        }
      }

      for (const img of doc.body.querySelectorAll('img')) {
        imageId += 1;
        img.setAttribute(helperAttrImage, String(imageId));
      }
    }

    function getMarkedHtml() {
      if (!state.doc) return '';
      return state.doc.documentElement.outerHTML;
    }

    function getCleanHtml() {
      if (!state.doc) return '';
      const clone = state.doc.documentElement.cloneNode(true);
      clearEditorMarks(clone);
      clone.querySelectorAll('[data-xe-temp-insert]').forEach((node) => {
        node.removeAttribute('data-xe-temp-insert');
        if (!node.getAttribute('style')) node.removeAttribute('style');
      });
      return '<!doctype html>\n' + clone.outerHTML;
    }

    function getBodyText(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return (tmp.textContent || '').replace(/\s+/g, ' ').trim();
    }

    function getHistorySnapshot() {
      return {
        html: state.doc ? getCleanHtml() : '',
        sourceLocked: state.sourceLocked,
        sourceValue: dom.sourceBox.value,
        templates: JSON.parse(JSON.stringify(state.templates || [])),
        activeTemplateId: state.activeTemplateId
      };
    }

    function hasMeaningfulSnapshot(snapshot) {
      return Boolean(snapshot.html || snapshot.sourceValue || (snapshot.templates && snapshot.templates.length));
    }

    function recordHistory() {
      if (state.suppressHistory) return;
      const snapshot = getHistorySnapshot();
      if (!hasMeaningfulSnapshot(snapshot)) return;
      const last = state.undoStack[state.undoStack.length - 1];
      if (
        last &&
        last.html === snapshot.html &&
        last.sourceValue === snapshot.sourceValue &&
        JSON.stringify(last.templates) === JSON.stringify(snapshot.templates) &&
        last.activeTemplateId === snapshot.activeTemplateId
      ) return;
      state.undoStack.push(snapshot);
      if (state.undoStack.length > state.historyLimit) {
        state.undoStack.shift();
      }
      state.redoStack = [];
      updateHistoryButtons();
    }

    function applySnapshot(snapshot) {
      state.suppressHistory = true;
      try {
        if (snapshot.html) {
          const parser = new DOMParser();
          const parsed = parser.parseFromString(snapshot.html, 'text/html');
          setWorkingDocument(parsed);
        } else {
          state.doc = null;
          state.sourceLocked = snapshot.sourceLocked;
          dom.sourceBox.value = snapshot.sourceValue || '';
          dom.sourceBox.readOnly = snapshot.sourceLocked;
          dom.imageList.innerHTML = '';
          dom.imageState.textContent = '0 张图片';
          updateSourceState();
          renderPreview();
        }
        if (Array.isArray(snapshot.templates) && snapshot.templates.length) {
          state.templates = JSON.parse(JSON.stringify(snapshot.templates));
          state.activeTemplateId = snapshot.activeTemplateId || state.templates[0].id;
          saveTemplatesToStorage();
          if (document.getElementById('templateBackdrop')?.classList.contains('open')) {
            renderTemplateList();
            renderTemplateEditor();
          }
        }
      } finally {
        state.suppressHistory = false;
        updateHistoryButtons();
      }
    }

    function undo() {
      if (!state.undoStack.length) return;
      const current = getHistorySnapshot();
      const previous = state.undoStack.pop();
      if (hasMeaningfulSnapshot(current)) {
        state.redoStack.push(current);
      }
      applySnapshot(previous);
      setStatus('已撤销');
    }

    function redo() {
      if (!state.redoStack.length) return;
      const current = getHistorySnapshot();
      const next = state.redoStack.pop();
      if (hasMeaningfulSnapshot(current)) {
        state.undoStack.push(current);
      }
      applySnapshot(next);
      setStatus('已重做');
    }

    function updateHistoryButtons() {
      const undoBtn = document.getElementById('undoBtn');
      const redoBtn = document.getElementById('redoBtn');
      if (undoBtn) undoBtn.disabled = state.undoStack.length === 0;
      if (redoBtn) redoBtn.disabled = state.redoStack.length === 0;
    }

    function updateSourceState() {
      dom.sourceState.textContent = state.sourceLocked ? '样式已锁定' : '未锁定';
      if (!state.doc) {
        dom.structureState.textContent = '';
        return;
      }
      const sectionCount = state.doc.querySelectorAll('section').length;
      const styleCount = state.doc.querySelectorAll('[style]').length;
      const imgCount = state.doc.querySelectorAll('img').length;
      const textCount = state.doc.querySelectorAll(`[${helperAttrText}]`).length;
      dom.structureState.textContent = `section ${sectionCount} / style ${styleCount} / 文字 ${textCount} / 图片 ${imgCount}`;
    }

    function renderPreview() {
      if (!state.doc) {
        dom.previewFrame.classList.add('hidden');
        dom.emptyPreview.classList.remove('hidden');
        return;
      }
      dom.emptyPreview.classList.add('hidden');
      dom.previewFrame.classList.remove('hidden');
      dom.previewFrame.srcdoc = getPreviewHtml();
    }

    function getPreviewHtml() {
      if (!state.doc) return '';
      const clone = state.doc.documentElement.cloneNode(true);
      clone.querySelectorAll('img').forEach((img) => {
        img.setAttribute('referrerpolicy', 'no-referrer');
      });
      return clone.outerHTML;
    }

    function attachPreviewHandlers() {
      const pdoc = dom.previewFrame.contentDocument;
      if (!pdoc || !pdoc.body) return;

      const style = pdoc.createElement('style');
      style.textContent = `
        [${helperAttrText}] {
          cursor: text !important;
          transition: outline-color .12s ease, background-color .12s ease;
        }
        [${helperAttrText}]:hover {
          outline: 2px solid rgba(231, 58, 48, .65) !important;
          outline-offset: 2px !important;
          background-color: rgba(255, 240, 238, .55) !important;
        }
        [${helperAttrText}].xe-active-text {
          outline: 2px solid #e73a30 !important;
          outline-offset: 2px !important;
        }
        img[${helperAttrImage}] {
          cursor: pointer !important;
        }
        img[${helperAttrImage}]:hover {
          outline: 4px solid rgba(231, 58, 48, .9) !important;
          outline-offset: 4px !important;
          box-shadow: 0 0 0 7px rgba(255, 230, 0, .55), 0 0 0 11px rgba(231, 58, 48, .2) !important;
        }
        img.xe-active-image {
          outline: 5px solid #e73a30 !important;
          outline-offset: 5px !important;
          box-shadow: 0 0 0 9px rgba(255, 230, 0, .72), 0 0 0 15px rgba(231, 58, 48, .24) !important;
          filter: saturate(1.08) contrast(1.04) !important;
          animation: xeImagePulse 1.1s ease-in-out 0s 2 !important;
        }
        @keyframes xeImagePulse {
          0%, 100% {
            outline-color: #e73a30;
            box-shadow: 0 0 0 9px rgba(255, 230, 0, .72), 0 0 0 15px rgba(231, 58, 48, .24);
          }
          50% {
            outline-color: #00a3ff;
            box-shadow: 0 0 0 13px rgba(255, 230, 0, .9), 0 0 0 22px rgba(0, 163, 255, .22);
          }
        }
      `;
      pdoc.head.appendChild(style);

      pdoc.querySelectorAll(`[${helperAttrText}]`).forEach((el) => {
        el.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          openTextEditor(el.getAttribute(helperAttrText));
        });
      });

      pdoc.querySelectorAll(`img[${helperAttrImage}]`).forEach((img) => {
        img.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          selectImage(img.getAttribute(helperAttrImage), true);
        });
        img.addEventListener('load', syncFrameHeight);
        img.addEventListener('error', syncFrameHeight);
      });

      syncFrameHeight();
    }

    function syncFrameHeight() {
      const pdoc = dom.previewFrame.contentDocument;
      if (!pdoc || !pdoc.body) return;
      const height = Math.max(720, pdoc.documentElement.scrollHeight, pdoc.body.scrollHeight);
      dom.previewFrame.style.height = `${height + 20}px`;
    }

    function getWorkingTextElement(id) {
      return state.doc?.querySelector(`[${helperAttrText}="${CSS.escape(String(id))}"]`) || null;
    }

    function getPreviewTextElement(id) {
      return dom.previewFrame.contentDocument?.querySelector(`[${helperAttrText}="${CSS.escape(String(id))}"]`) || null;
    }

    function getWorkingImageElement(id) {
      return state.doc?.querySelector(`img[${helperAttrImage}="${CSS.escape(String(id))}"]`) || null;
    }

    function getPreviewImageElement(id) {
      return dom.previewFrame.contentDocument?.querySelector(`img[${helperAttrImage}="${CSS.escape(String(id))}"]`) || null;
    }

    function openTextEditor(id) {
      const el = getWorkingTextElement(id);
      if (!el) return;

      state.activeTextId = String(id);
      state.editingOriginalText = el.getAttribute(helperOriginal) || (el.textContent || '');
      state.editingOriginalHtml = el.innerHTML;
      state.editAlignment = el.style.textAlign || '';

      dom.editorTitle.textContent = `文字编辑 #${id}`;
      dom.editorSurface.innerHTML = el.innerHTML;
      dom.editorSurface.style.textAlign = state.editAlignment || '';
      dom.editorMeta.textContent = state.editingOriginalText;
      dom.editorBackdrop.classList.add('open');
      markActiveText(id);

      setTimeout(() => {
        dom.editorSurface.focus();
        placeCaretAtEnd(dom.editorSurface);
      }, 0);
    }

    function markActiveText(id) {
      const pdoc = dom.previewFrame.contentDocument;
      if (!pdoc) return;
      pdoc.querySelectorAll('.xe-active-text').forEach((el) => el.classList.remove('xe-active-text'));
      const el = getPreviewTextElement(id);
      if (el) {
        el.classList.add('xe-active-text');
        el.scrollIntoView({ block: 'center', inline: 'nearest', behavior: 'smooth' });
      }
    }

    function closeTextEditor(revertPreview = true) {
      if (revertPreview && state.activeTextId) {
        const el = getPreviewTextElement(state.activeTextId);
        const workingEl = getWorkingTextElement(state.activeTextId);
        if (el && workingEl) {
          el.innerHTML = workingEl.innerHTML;
          el.setAttribute('style', workingEl.getAttribute('style') || '');
        }
      }
      dom.editorBackdrop.classList.remove('open');
      dom.editorSurface.innerHTML = '';
      state.activeTextId = null;
      state.editingOriginalText = '';
      state.editingOriginalHtml = '';
      state.editAlignment = '';
      const pdoc = dom.previewFrame.contentDocument;
      pdoc?.querySelectorAll('.xe-active-text').forEach((el) => el.classList.remove('xe-active-text'));
      syncFrameHeight();
    }

    function placeCaretAtEnd(el) {
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function execInlineCommand(command, value = null) {
      dom.editorSurface.focus();
      document.execCommand('styleWithCSS', false, true);
      document.execCommand(command, false, value);
      normalizeFontTags(dom.editorSurface);
      updateLivePreview();
    }

    function normalizeFontTags(container) {
      container.querySelectorAll('font[color]').forEach((font) => {
        const span = document.createElement('span');
        span.style.color = font.getAttribute('color');
        span.innerHTML = font.innerHTML;
        font.replaceWith(span);
      });
      container.querySelectorAll('font[size]').forEach((font) => {
        const span = document.createElement('span');
        span.innerHTML = font.innerHTML;
        font.replaceWith(span);
      });
    }

    function wrapSelectionWithStyle(styleText) {
      dom.editorSurface.focus();
      const selection = window.getSelection();
      if (!selection.rangeCount || !dom.editorSurface.contains(selection.anchorNode) || selection.isCollapsed) {
        const span = document.createElement('span');
        span.setAttribute('style', styleText);
        span.innerHTML = dom.editorSurface.innerHTML || '<br>';
        dom.editorSurface.innerHTML = '';
        dom.editorSurface.appendChild(span);
        updateLivePreview();
        return;
      }

      const range = selection.getRangeAt(0);
      const span = document.createElement('span');
      span.setAttribute('style', styleText);
      try {
        span.appendChild(range.extractContents());
        range.insertNode(span);
        selection.removeAllRanges();
        const nextRange = document.createRange();
        nextRange.selectNodeContents(span);
        nextRange.collapse(false);
        selection.addRange(nextRange);
      } catch (error) {
        const fallback = document.createElement('span');
        fallback.setAttribute('style', styleText);
        fallback.textContent = selection.toString();
        range.deleteContents();
        range.insertNode(fallback);
      }
      updateLivePreview();
    }

    function applyAlignment(value) {
      state.editAlignment = value;
      dom.editorSurface.style.textAlign = value;
      updateToolbarAlign(value);
      updateLivePreview();
    }

    function updateToolbarAlign(value) {
      document.querySelectorAll('[data-align]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.align === value);
      });
    }

    function updateLivePreview() {
      if (!state.activeTextId) return;
      const previewEl = getPreviewTextElement(state.activeTextId);
      if (!previewEl) return;
      previewEl.innerHTML = htmlWithTempInsertions(dom.editorSurface.innerHTML, state.editingOriginalText);
      previewEl.style.textAlign = state.editAlignment || '';
      syncFrameHeight();
    }

    function htmlWithTempInsertions(html, originalPlain) {
      const container = document.createElement('div');
      container.innerHTML = html;
      const plain = container.textContent || '';
      const original = originalPlain || '';

      if (!plain || plain === original) {
        return container.innerHTML;
      }

      let prefix = 0;
      const maxPrefix = Math.min(plain.length, original.length);
      while (prefix < maxPrefix && plain[prefix] === original[prefix]) {
        prefix++;
      }

      let suffix = 0;
      while (
        suffix < plain.length - prefix &&
        suffix < original.length - prefix &&
        plain[plain.length - 1 - suffix] === original[original.length - 1 - suffix]
      ) {
        suffix++;
      }

      const start = prefix;
      const end = plain.length - suffix;
      if (end <= start) {
        return container.innerHTML;
      }

      wrapTextRange(container, start, end);
      return container.innerHTML;
    }

    function wrapTextRange(root, start, end) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const nodes = [];
      let position = 0;
      let node;
      while ((node = walker.nextNode())) {
        const length = node.nodeValue.length;
        const nodeStart = position;
        const nodeEnd = position + length;
        if (nodeEnd > start && nodeStart < end) {
          nodes.push({
            node,
            from: Math.max(0, start - nodeStart),
            to: Math.min(length, end - nodeStart)
          });
        }
        position = nodeEnd;
      }

      for (const item of nodes.reverse()) {
        const { node: textNode, from, to } = item;
        const text = textNode.nodeValue;
        const frag = document.createDocumentFragment();
        if (from > 0) frag.appendChild(document.createTextNode(text.slice(0, from)));
        const span = document.createElement('span');
        span.setAttribute('data-xe-temp-insert', '1');
        span.style.color = '#e73a30';
        span.textContent = text.slice(from, to);
        frag.appendChild(span);
        if (to < text.length) frag.appendChild(document.createTextNode(text.slice(to)));
        textNode.parentNode.replaceChild(frag, textNode);
      }
    }

    function cleanEditorHtml(html) {
      const container = document.createElement('div');
      container.innerHTML = html;
      container.querySelectorAll('script, style').forEach((node) => node.remove());
      container.querySelectorAll('[data-xe-temp-insert]').forEach((node) => {
        node.removeAttribute('data-xe-temp-insert');
      });
      return container.innerHTML;
    }
